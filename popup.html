
<!doctype html>
<html>
  <head>
    <title>Open Source Commit Clicker</title>
    <script src="popup.js" defer></script>
  </head>

    <h1>Click the logo to make a commit!</h1>
    <h2 id="commits">Commits: 0</h2>

</html>

  body {

    background-color: #333334;
